{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha | EvolutyApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/sales.css' %}">
    <style>
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: linear-gradient(165deg, #152746, #0f1b30); border: 1px solid rgba(51,212,255,0.3); border-radius: 18px; padding: 48px; max-width: 440px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .auth-header { text-align: center; margin-bottom: 28px; }
        .auth-header h1 { font-size: 26px; margin-bottom: 8px; color: var(--text); }
        .auth-header p { color: var(--muted); font-size: 15px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text); }
        .form-input { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: var(--text); font-size: 15px; transition: all 0.3s; box-sizing: border-box; }
        .form-input:focus { outline: none; border-color: var(--primary); background: rgba(255,255,255,0.08); }
        .btn-primary { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .auth-footer { text-align: center; margin-top: 24px; }
        .auth-footer a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Recuperar Senha</h1>
                <p>Digite seu e-mail e enviaremos um link para redefinir sua senha.</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                <div style="background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:#86efac;padding:12px 16px;border-radius:8px;margin-bottom:20px;">
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_email">E-mail cadastrado</label>
                    <input type="email" name="email" id="id_email" class="form-input" placeholder="seu@email.com" required autofocus>
                </div>
                <button type="submit" class="btn-primary">Enviar link de recuperação</button>
            </form>

            <div class="auth-footer">
                <p><a href="{% url 'accounts:login' %}">← Voltar para o login</a></p>
            </div>
        </div>
    </div>
</body>
</html>
