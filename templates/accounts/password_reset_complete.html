{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senha Alterada | EvolutyApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/sales.css' %}">
    <style>
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: linear-gradient(165deg, #152746, #0f1b30); border: 1px solid rgba(51,212,255,0.3); border-radius: 18px; padding: 48px; max-width: 440px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.5); text-align: center; }
        .icon { font-size: 60px; margin-bottom: 20px; }
        h1 { font-size: 26px; margin-bottom: 12px; color: var(--text); }
        p { color: var(--muted); font-size: 15px; line-height: 1.6; margin-bottom: 16px; }
        .btn-primary { display: inline-block; padding: 14px 32px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.3s; margin-top: 8px; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="icon">✅</div>
            <h1>Senha alterada!</h1>
            <p>Sua senha foi redefinida com sucesso. Agora você já pode fazer login com a nova senha.</p>
            <a href="{% url 'accounts:login' %}" class="btn-primary">Fazer login</a>
        </div>
    </div>
</body>
</html>
